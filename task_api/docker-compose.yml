services:
  task-api:
    image: localhost:5000/task-api:latest
    container_name: task-api
    ports:
      - "2999:2999"
    volumes:
      - /mnt/raid1/lib/tasks.md/tasks:/data/tasks
    environment:
      - PYTHONUNBUFFERED=1
      - TASK_CONFIG_PATH=/app/config/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - task-api-network

networks:
  task-api-network:
    driver: bridge
